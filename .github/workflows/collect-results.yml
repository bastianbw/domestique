name: Collect stage results

# Best-effort automatic collection during the Tour (4–26 July 2026).
# TWO daily runs:
#  - MORNING (05:30 UTC / 07:30 CEST): weather forecast for TODAY's stage —
#    the pre-stage nudge you actually want before picking a team. No results
#    attempt (the stage hasn't been raced).
#  - EVENING (19:00 UTC / 21:00 CEST): today's stage result — primary source is
#    the OFFICIAL letour.fr site (confirmed reachable from Actions' IP, unlike
#    PCS/firstcycling/Eurosport — see probe-sources.yml), falling back to PCS
#    (best-effort — 403'd at the Cloudflare edge, see scripts/collect_stage.py)
#    if letour.fr's page structure ever changes — + tomorrow's weather forecast.
# Whatever succeeded is bundled into data/latest.json; the PWA pulls it via the
# raw GitHub URL (Stages & Data → ①½). Weather is expected to succeed every
# run (Open-Meteo doesn't block); results are the fragile part, with manual
# paste as the reliable fallback.

on:
  schedule:
    - cron: '30 5 * 7 *'   # 05:30 UTC every day in July — morning weather
    - cron: '0 19 * 7 *'   # 19:00 UTC every day in July — results + tomorrow weather
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage number to collect (manual run / backfill; forces evening mode)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests procyclingstats cloudscraper

      - name: Determine stage and run mode from today's date
        id: stage
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import datetime, os
          # Tour de France 2026 date → stage (rest days 13 & 20 July omitted)
          SCHED = {4:1,5:2,6:3,7:4,8:5,9:6,10:7,11:8,12:9,
                   14:10,15:11,16:12,17:13,18:14,19:15,
                   21:16,22:17,23:18,24:19,25:20,26:21}
          manual = os.environ.get("MANUAL_STAGE", "").strip()
          now = datetime.datetime.utcnow()
          if manual:
              print(f"stage={manual}")
              print("mode=evening")
          else:
              s = SCHED.get(now.day) if now.month == 7 else None
              print(f"stage={s if s else ''}")
              print(f"mode={'morning' if now.hour < 12 else 'evening'}")
          PY
        env:
          MANUAL_STAGE: ${{ github.event.inputs.stage }}

      - name: Collect result block (evening only — letour.fr primary, PCS fallback)
        id: results
        if: steps.stage.outputs.stage != '' && steps.stage.outputs.mode == 'evening'
        continue-on-error: true
        run: |
          if python scripts/collect_stage_letour.py --stage "${{ steps.stage.outputs.stage }}" --out data; then
            echo "source=letour" >> "$GITHUB_OUTPUT"
          elif python scripts/collect_stage.py --year 2026 --stage "${{ steps.stage.outputs.stage }}" --out data; then
            echo "source=pcs" >> "$GITHUB_OUTPUT"
          else
            echo "Both result sources failed — nothing collected this run." >&2
            exit 1
          fi

      - name: Collect weather forecast (today's stage in the morning, tomorrow's in the evening)
        id: weather
        if: steps.stage.outputs.stage != ''
        continue-on-error: true
        run: |
          if [ "${{ steps.stage.outputs.mode }}" = "morning" ]; then
            TARGET="${{ steps.stage.outputs.stage }}"
          else
            TARGET=$(( ${{ steps.stage.outputs.stage }} + 1 ))
          fi
          if [ "$TARGET" -le 21 ]; then
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
            python scripts/collect_weather.py --stage "$TARGET" --out data
          fi

      - name: Bundle latest.json + stage-N.json (only blocks produced by THIS run)
        if: steps.stage.outputs.stage != ''
        run: |
          python - <<'PY'
          import json, os
          blocks = []
          got_result = "${{ steps.results.outcome }}" == "success"
          # Result only when THIS run's collection succeeded — bundling an older
          # stage-N.json would re-serve a stale result (the app skips re-logging,
          # but there's no reason to ship it).
          rp = "data/stage-${{ steps.stage.outputs.stage }}.json"
          if got_result and os.path.exists(rp):
              blocks.append(json.load(open(rp, encoding="utf-8")))
          wt = "${{ steps.weather.outputs.target }}"
          if wt:
              wp = f"data/weather-stage-{wt}.json"
              if os.path.exists(wp):
                  blocks.append(json.load(open(wp, encoding="utf-8")))
          if blocks:
              json.dump(blocks, open("data/latest.json", "w", encoding="utf-8"), ensure_ascii=False, indent=2)
              print(f"bundled {len(blocks)} block(s) into latest.json")
              # Also fold into stage-N.json itself (not just the "latest" pointer)
              # so a per-stage URL — the durable one, unlike latest.json which
              # only ever reflects the newest run — stays fetchable forever with
              # the same result+weather richness, not just the bare result.
              if got_result and len(blocks) > 1:
                  json.dump(blocks, open(rp, "w", encoding="utf-8"), ensure_ascii=False, indent=2)
                  print(f"also bundled into {rp}")
          else:
              print("nothing new this run — latest.json left untouched")
          PY

      - name: Commit data
        if: steps.stage.outputs.stage != ''
        run: |
          git config user.name  "domestique-bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "collect: stage ${{ steps.stage.outputs.stage }} (${{ steps.stage.outputs.mode }})" || echo "no changes"
          git push
